<html>

<head>
    <script src="scripts/moment.js"></script>
    <script src="scripts/panel.js"></script>
</head>
<style>
    #api-spy-panel {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        font-size: 0.99em;
    }

    h1,
    h2,
    h3,
    h4 {
        font-family: 'Segoe UI Light', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: normal;
    }

    a,
    a:visited,
    a:active {
        color: #6699ee;
    }

    .link-button {
        background-color: transparent;
        border: none;
        color: #0078d7;
        cursor: pointer;
        text-decoration: none;
        display: inline;
        margin: 0;
        padding: 0;
    }

    #requests-table {
        border-collapse: collapse;
    }

    #requests-table thead tr th {
        padding: 2px;
        text-align: left;
    }

    #requests-table tbody tr td {
        padding: 2px;
    }

    #requests-table tbody tr {
        background-color: transparent;
        transition: background-color 75ms ease-in-out;
    }
    #requests-table tbody tr:hover {
        background-color: #323232;
    }

    #requests-table tbody td.request-uri {
        cursor: pointer;
    }

    #gantt-chart-container {
        /*
            Column format: 
            1: Name
            2: Cache
            3: Duration
            4: Gantt chart
        */
        display: grid;
        /* Set 100 columns here so we can easily assign columns in percentages */
        grid-template-columns: -webkit-max-content -webkit-max-content -webkit-max-content repeat(100, 1fr);
        grid-template-columns: max-content max-content max-content repeat(100, 1fr);
        grid-template-rows: auto;
    }

    #gantt-chart-container>div {
        display: inline-block;
        padding: 2px;
    }

    #gantt-chart-container .name {
        grid-column: 1;
        font-family: 'Segoe UI Semibold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #gantt-chart-container .cache {
        grid-column: 2
    }

    #gantt-chart-container .duration {
        grid-column: 3
    }

    #gantt-chart-container .gantt-background {
        background-color: #868686;
        grid-column: 4 / none;
        /* Indicates that this should span from 5th columns to the end */
        border: solid 1px #aaaaaa;
    }

    #gantt-chart-container .gantt-bar {
        height: 23px;
        grid-column: 4 / none;
        background-color: rgb(62, 202, 92);
        transition: background-color 300ms ease-in-out;
    }

    #gantt-chart-container .gantt-bar:hover {
        background-color: rgb(63, 161, 84);
    }

    .loading-container {
        display: none;
    }
</style>
<script src="scripts/jquery-3.4.1.min.js"></script>

<body id='api-spy-panel'>


    <div id='panel-root'>

        <div>
            <h2>Api Spy</h2>
            <p>
                Api Spy is an api debugger for node. For more information on how to set up and use this tool check out
                the <a href="https://github.com/willfrasier/api-spy#readme" target="_blank">wiki</a>.
            </p>
            <p>
                Select a request below to see the back end api characteristics.
            </p>
        </div>

        <div id='requests-container'>
            <table id='requests-table'>
                <thead>
                    <tr>
                        <th>url</th>
                        <th>status</th>
                        <th>duration</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <div id='details-container'>

            <div id='loading-container'>
                Loading...
            </div>

            <div id='details-panel'>

                <h2>Request Details</h2>

                <div id='gantt-chart-container'>

                </div>

            </div>

        </div>

    </div>
</body>

</html>
