<html>

<head>
    <script src="scripts/moment.js"></script>
    <script src="scripts/panel.js"></script>
</head>
<style>
    #api-spy-panel {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        font-size: 0.99em;
    }

    h1,
    h2,
    h3,
    h4 {
        font-family: 'Segoe UI Light', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: normal;
        margin: 0;
    }

    a,
    a:visited,
    a:active {
        color: #6699ee;
    }

    .link-button {
        background-color: transparent;
        border: none;
        color: #0078d7;
        cursor: pointer;
        text-decoration: none;
        display: inline;
        margin: 0;
        padding: 0;
    }

    #panel-root {
        /*
            Columns: 
            1: Requests Panel
            2: Details Panel

            Rows: 
            1: Header
            2: Requests andand Details Panel
        */
        display: grid;
        /* Set 100 columns here so we can easily assign columns in percentages */
        grid-template-columns: minmax(500px, max-content) auto;
        grid-template-rows: max-content auto;

    }

    #panel-root #header {
        grid-row: 1;
        grid-column: 1 / 3;
        /* span to end */
    }

    #panel-root #requests-container {
        grid-row: 2;
        grid-column: 1;
        padding-right: 24px;
    }

    #panel-root #details-container {
        grid-row: 2;
        grid-column: 2;
    }

    #requests-table {
        border-collapse: collapse;
    }

    #requests-table thead tr th {
        padding: 2px;
        text-align: left;
    }

    #requests-table tbody tr td {
        padding: 2px;
    }

    #requests-table tbody tr {
        background-color: transparent;
        transition: background-color 75ms ease-in-out;
    }

    #requests-table tbody tr:hover {
        background-color: #323232;
    }

    #requests-table tbody td {
        cursor: default;
    }

    #requests-table tbody td.request-uri {
        cursor: pointer;
    }

    #gantt-chart-container {
        /*
            Column format: 
            1: Name
            2: Cache
            3: Duration
            4: Gantt chart
        */
        display: grid;
        /* Set 100 columns here so we can easily assign columns in percentages */
        grid-template-columns: -webkit-max-content -webkit-max-content -webkit-max-content repeat(100, 1fr);
        grid-template-columns: max-content max-content max-content repeat(100, 1fr);
        grid-template-rows: auto;
    }

    #gantt-chart-container>div {
        display: inline-block;
        padding: 2px;
    }

    #gantt-chart-container .name {
        grid-column: 1;
        font-family: 'Segoe UI Semibold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #gantt-chart-container .cache {
        grid-column: 2
    }

    #gantt-chart-container .duration {
        grid-column: 3
    }

    #gantt-chart-container .gantt-background {
        background-color: #333333;
        grid-column: 4 / none;
        /* Indicates that this should span from 5th columns to the end */
        border: solid 1px #444444;
    }

    #gantt-chart-container .gantt-bar {
        height: 23px;
        grid-column: 4 / none;
        background-color: rgb(62, 202, 92);
        transition: background-color 300ms ease-in-out;
    }

    #gantt-chart-container .gantt-bar:hover {
        background-color: rgb(63, 161, 84);
    }

    .loading-container {
        display: none;
    }

    .font-color-good {
        color: rgb(62, 202, 92);
    }

    .font-color-bad {
        color: rgb(255, 45, 45);
    }

    .property>label {
        min-width: 200px;
        display: inline-block;
    }

    .property>div {
        display: inline-block;
    }

    #debug-panel,
    #query-details .property.query-code>pre,
    #query-details .property.query-stats>pre {
        font-family: 'Segoe Mono Boot', 'Consolas', 'Courier New', monospace;
        color: white;
        font-size: 0.99em;
        word-break: break-all;
        white-space: pre-wrap;
    }

    #query-details .property.query-code>pre,
    #query-details .property.query-stats>pre {
        margin-left: 48px;
    }

    #details-panel {
        border-left: solid 1px #373737;
        padding-left: 24px;
        display: none;
    }

    #details-panel>h2:not(:first-child) {
        margin-top: 25px;
    }

    #details-panel>h2,
    #details-panel #query-details-container>h2 {
        border-bottom: solid 1px #525252;
        margin-bottom: 8px;
    }
</style>
<script src="scripts/jquery-3.4.1.min.js"></script>

<body id='api-spy-panel'>
    <div id='panel-root'>

        <div id='header'>
            <h2>Api Spy</h2>
            <p>
                Api Spy is an api debugger for node. For more information on how to set up and use this tool check out
                the <a href="https://github.com/willfrasier/api-spy#readme" target="_blank">wiki</a>.
            </p>
            <p>
                Select a request below to see the back end api characteristics.
            </p>
        </div>

        <div id='requests-container'>
            <table id='requests-table'>
                <thead>
                    <tr>
                        <th>url</th>
                        <th>status</th>
                        <th>duration</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <div id='details-container'>

            <div id='loading-container'>
                Loading...
            </div>

            <div id='details-panel'>

                <h2>Summary</h2>
                <div id='request-summary'>
                    <div class="property request-id">
                        <label>Request Id</label>
                        <div></div>
                    </div>
                    <div class="property uri">
                        <label>Url</label>
                        <div></div>
                    </div>
                    <div class="property overall-time">
                        <label>Overall Time (fetch + api)</label>
                        <div></div>
                    </div>
                    <div class="property api-time">
                        <label>Api Time</label>
                        <div></div>
                    </div>
                    <div class="property queries-total">
                        <label>Queries</label>
                        <div></div>
                    </div>
                    <div class="property queries-cached">
                        <label>Queries (Cached)</label>
                        <div></div>
                    </div>
                    <div class="property queries-not-cached">
                        <label>Queries (Not Cached)</label>
                        <div></div>
                    </div>
                </div>

                <h2>Request Timing</h2>
                <div id='gantt-chart-container'>
                </div>

                <div id='query-details-container'>
                    <h2>Query Details</h2>
                    <div id='query-details'>
                        <div class="property query-name">
                            <label>Query Name</label>
                            <div></div>
                        </div>
                        <div class="property query-start">
                            <label>Started</label>
                            <div></div>
                        </div>
                        <div class="property query-duration">
                            <label>Duration</label>
                            <div></div>
                        </div>
                        <div class="property query-from-cache">
                            <label>From Cache</label>
                            <div></div>
                        </div>
                        <div class="property query-code">
                            <label>Code</label>
                            <pre></pre>
                        </div>
                        <div class="property query-stats">
                            <label>Query Statistics (at time of caching)</label>
                            <pre></pre>
                        </div>
                    </div>
                </div>


                <!-- <h2>Debug Only</h2>
                <pre id='debug-panel'>
                </pre> -->

            </div>

        </div>

    </div>
</body>

</html>
