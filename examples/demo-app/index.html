<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>api-spy demo</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background: #0a0f1f; color: #e5e7eb; margin: 0; }
      main { max-width: 720px; margin: 40px auto; padding: 0 20px; }
      h1 { color: #f3f4f6; }
      p { color: #9ca3af; }
      code { background: #1f2937; padding: 2px 6px; border-radius: 4px; color: #93c5fd; }
      button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font: inherit; }
      button:hover { background: #2563eb; }
      button:disabled { background: #374151; cursor: not-allowed; }
      .row { display: flex; gap: 10px; align-items: center; margin: 16px 0; }
      .row--wrap { flex-wrap: wrap; gap: 8px; }
      .scenarios-heading { color: #f3f4f6; margin-top: 28px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
      pre { background: #111827; padding: 14px; border-radius: 8px; overflow: auto; font-size: 12px; color: #e5e7eb; }
      .status { color: #9ca3af; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
